<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Mesh gradient tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg-dark: #111111;
    --bg-page: #f3f4f6;
    --text: #000000;
    --text-subtle: #737373;
    --text-muted: rgba(38,38,38,0.32);
    --volt: #dbf530;
    --border: #dcdcdc;
    --border-dark: #2a2a2a;
    --space-sm: 14px;
    --space-md: 20px;
    --space-lg: 28px;
    --space-xl: 40px;
    --sans: 'Alliance No.2', system-ui, -apple-system, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  ::selection { background: var(--volt); color: #000; }
  html, body { margin: 0; padding: 0; background: var(--bg-page); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.5; }
  .app { display: flex; min-height: 100vh; align-items: flex-start; }
  .canvas-col { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .panel { flex: 0 0 340px; min-height: 100vh; }
  .canvas-col { padding: 0; }
  .canvas-col-header { display: flex; align-items: baseline; justify-content: space-between; padding: 16px 20px; }
  .title { font-size: 18px; font-weight: 600; letter-spacing: 0.02em; }
  .meta { font-family: var(--mono); font-size: 12px; color: var(--text-subtle); letter-spacing: 0.04em; text-transform: uppercase; }
  .stage-wrap { flex: 1; overflow: hidden; }
  .stage { position: relative; width: 100%; height: 100vh; }
  .stage canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  #output { z-index: 1; }
  #interaction { z-index: 2; cursor: crosshair; }

  .panel { background: var(--bg-dark); color: #e4e4e7; border-left: 1px solid var(--border-dark); padding: var(--space-lg) var(--space-md); overflow-y: auto; }
  .section { border-top: 1px solid var(--border-dark); }
  .section:first-child { border-top: none; }
  .section-head { width: 100%; background: none; border: none; color: inherit; padding: var(--space-md) 0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-family: var(--mono); font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; }
  .section-head .chev { color: var(--text-muted); font-family: var(--mono); }
  .section-body { padding-bottom: var(--space-md); display: none; }
  .section.open .section-body { display: block; }
  .section.open .chev::before { content: '−'; }
  .section:not(.open) .chev::before { content: '+'; }

  .field { display: flex; align-items: center; gap: var(--space-sm); margin-bottom: 10px; }
  .field label { flex: 0 0 90px; font-family: var(--mono); font-size: 11px; color: #a1a1aa; text-transform: uppercase; letter-spacing: 0.04em; }
  .field .grow { flex: 1; }
  .field .val { font-family: var(--mono); font-size: 11px; color: #a1a1aa; min-width: 36px; text-align: right; }

  input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; flex: 1; height: 18px; }
  input[type=range]::-webkit-slider-runnable-track { background: var(--border-dark); height: 1px; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; background: var(--volt); width: 10px; height: 10px; border: 1px solid #000; margin-top: -5px; }
  input[type=range]::-moz-range-track { background: var(--border-dark); height: 1px; }
  input[type=range]::-moz-range-thumb { background: var(--volt); width: 10px; height: 10px; border: 1px solid #000; border-radius: 0; }

  select, input[type=number], input[type=text], input[type=file] {
    background: transparent; color: #e4e4e7; border: 1px solid var(--border-dark);
    padding: 6px 8px; font-family: var(--mono); font-size: 12px; border-radius: 0;
    outline: none; min-width: 0; color-scheme: dark;
  }
  select:focus-visible, input:focus-visible { border-color: #e4e4e7; }
  input[type=number] { width: 64px; text-align: center; -moz-appearance: textfield; appearance: textfield; }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; appearance: none; margin: 0; }
  input[type=file] { font-family: var(--sans); }
  input[type=color] { background: transparent; border: 1px solid var(--border-dark); width: 28px; height: 22px; padding: 0; cursor: pointer; }
  input[type=checkbox] { accent-color: var(--volt); width: 14px; height: 14px; }

  button {
    background: transparent; color: #e4e4e7; border: 1px solid var(--border-dark);
    padding: 8px 14px; font-family: var(--sans); font-size: 13px; border-radius: 0; cursor: pointer;
    transition: color 150ms, border-color 150ms, background-color 150ms;
  }
  button:hover { color: var(--volt); border-color: #e4e4e7; }
  button.primary { background: #000; color: #fff; border-color: #000; position: relative; overflow: hidden; }
  button.primary:hover { color: #000; }
  button.primary .__pf-text { position: relative; z-index: 2; pointer-events: none; }
  button.primary .__pf-overlay { position: absolute; inset: 0; pointer-events: none; }
  button.icon { padding: 4px 8px; font-family: var(--mono); }

  .ramp-stop { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .ramp-stop .val { font-family: var(--mono); font-size: 11px; color: #a1a1aa; min-width: 32px; }

  .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-sm); }
  .toggle-row .label { font-family: var(--mono); font-size: 11px; color: #a1a1aa; text-transform: uppercase; letter-spacing: 0.04em; }
  .switch { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }

  #dispThumb { display: block; max-width: 100%; max-height: 90px; border: 1px solid var(--border-dark); margin-top: 6px; }
  .hint { font-family: var(--mono); font-size: 11px; color: var(--text-muted); margin: 6px 0; }
  .pair { display: flex; gap: 8px; }
  .pair > * { flex: 1; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
<script src="displacement-default.js"></script>
</head>
<body>
<div class="app">
  <div class="canvas-col">
    <div class="stage-wrap">
      <div class="stage" id="stage">
        <canvas id="output" width="900" height="600"></canvas>
        <canvas id="interaction" width="900" height="600"></canvas>
      </div>
    </div>

<input type="color" id="hiddenColor" style="position:absolute;opacity:0;pointer-events:none;">
  </div>

  <aside class="panel">
    <div class="section open" data-section>
      <button class="section-head"><span>Mesh</span><span class="chev"></span></button>
      <div class="section-body">
        <div class="field">
          <label>Cols</label>
          <input type="number" id="gridCols" value="4" min="2" max="10" style="width:60px;">
          <label style="flex:0 0 auto;">Rows</label>
          <input type="number" id="gridRows" value="4" min="2" max="10" style="width:60px;">
          <button id="applyGrid" style="flex:0 0 auto;padding:6px 10px;font-size:12px;">Apply</button>
        </div>
        <div class="field">
          <label>Falloff</label>
          <input type="range" id="falloff" min="1" max="8" step="0.1" value="2.5">
          <span class="val" id="falloffVal">2.5</span>
        </div>
        <div class="pair">
          <button id="randomizeColors">Randomize</button>
          <button id="addPoint">Add point</button>
        </div>
      </div>
    </div>

    <div class="section" data-section>
      <button class="section-head"><span>Blur</span><span class="chev"></span></button>
      <div class="section-body">
        <div class="toggle-row"><span class="label">On</span><label class="switch"><input type="checkbox" id="blurOn"></label></div>
        <div class="field">
          <label>Radius</label>
          <input type="range" id="blurRadius" min="0" max="60" value="8">
          <span class="val" id="blurRadiusVal">8</span>
        </div>
      </div>
    </div>

    <div class="section" data-section>
      <button class="section-head"><span>Distortion</span><span class="chev"></span></button>
      <div class="section-body">
        <div class="toggle-row"><span class="label">On</span><label class="switch"><input type="checkbox" id="distOn" checked></label></div>
        <div class="field">
          <label>X amp</label>
          <input type="range" id="distAmpX" min="0" max="120" value="20">
          <span class="val" id="distAmpXVal">20</span>
        </div>
        <div class="field">
          <label>Y amp</label>
          <input type="range" id="distAmpY" min="0" max="120" value="20">
          <span class="val" id="distAmpYVal">20</span>
        </div>
        <div class="field">
          <label>X freq</label>
          <input type="range" id="distFreqX" min="0.1" max="6" step="0.1" value="1.5">
          <span class="val" id="distFreqXVal">1.5</span>
        </div>
        <div class="field">
          <label>Y freq</label>
          <input type="range" id="distFreqY" min="0.1" max="6" step="0.1" value="1.5">
          <span class="val" id="distFreqYVal">1.5</span>
        </div>
      </div>
    </div>

    <div class="section" data-section>
      <button class="section-head"><span>Displacement</span><span class="chev"></span></button>
      <div class="section-body">
        <div class="toggle-row"><span class="label">On</span><label class="switch"><input type="checkbox" id="dispOn" checked></label></div>
        <div class="field">
          <input type="file" id="dispFile" accept="image/*" class="grow">
        </div>
        <img id="dispThumb" alt="">
        <div class="field">
          <label>X</label>
          <input type="range" id="dispStrengthX" min="-200" max="200" value="40">
          <span class="val" id="dispStrengthXVal">40</span>
        </div>
        <div class="field">
          <label>Y</label>
          <input type="range" id="dispStrengthY" min="-200" max="200" value="40">
          <span class="val" id="dispStrengthYVal">40</span>
        </div>
      </div>
    </div>

    <div class="section" data-section>
      <button class="section-head"><span>Colorama</span><span class="chev"></span></button>
      <div class="section-body">
        <div class="toggle-row"><span class="label">On</span><label class="switch"><input type="checkbox" id="coloramaOn" checked></label></div>
        <div id="ramp"></div>
        <button id="addStop">Add stop</button>
      </div>
    </div>

    <div class="section" data-section>
      <button class="section-head"><span>Noise</span><span class="chev"></span></button>
      <div class="section-body">
        <div class="toggle-row"><span class="label">On</span><label class="switch"><input type="checkbox" id="noiseOn" checked></label></div>
        <div class="field">
          <label>Amount</label>
          <input type="range" id="noiseIntensity" min="0" max="100" value="13">
          <span class="val" id="noiseIntensityVal">13</span>
        </div>
        <div class="field">
          <label>Mode</label>
          <select id="noiseBlend" class="grow">
            <option value="overlay" selected>overlay</option>
            <option value="screen">screen</option>
            <option value="multiply">multiply</option>
            <option value="soft-light">soft-light</option>
          </select>
        </div>
        <button id="reseedNoise">New seed</button>
      </div>
    </div>

    <div class="section open" data-section>
      <button class="section-head"><span>Export</span><span class="chev"></span></button>
      <div class="section-body">
        <div class="field">
          <label>W</label>
          <input type="number" id="exportW" value="1920" min="64" max="8192">
          <label style="flex:0 0 auto;">H</label>
          <input type="number" id="exportH" value="1080" min="64" max="8192">
        </div>
        <div class="field">
          <select id="exportPreset" class="grow">
            <option value="">Custom</option>
            <option value="640x480">640 × 480 (preview)</option>
            <option value="1280x720">1280 × 720</option>
            <option value="1920x1080" selected>1920 × 1080</option>
            <option value="2560x1440">2560 × 1440</option>
            <option value="3840x2160">3840 × 2160</option>
            <option value="1080x1080">1080 × 1080</option>
            <option value="1080x1920">1080 × 1920</option>
          </select>
        </div>
        <button id="exportBtn" class="primary">Export</button>
      </div>
    </div>
  </aside>
</div>

<script>
(() => {
  const W = 900, H = 600;
  const output = document.getElementById('output');
  const outCtx = output.getContext('2d');
  const interaction = document.getElementById('interaction');
  const intCtx = interaction.getContext('2d');

  // ---------- state ----------
  // Points in normalized 0..1 coords so they survive any export size.
  const state = {
    points: [],
    falloff: 2.5,
    blur: { on: false, radius: 8 },
    distortion: { on: true, ampX: 20, ampY: 20, freqX: 1.5, freqY: 1.5 },
    disp: { on: true, strengthX: 40, strengthY: 40 },
    colorama: { on: true, stops: [
      { t: 0.43, color: '#0a0033' },
      { t: 0.53, color: '#5cdd1e' },
      { t: 0.68, color: '#f0f5a8' },
    ]},
    noise: { on: true, intensity: 13, blend: 'overlay', seed: Math.floor(Math.random()*1e9) },
  };

  let dispImg = null; // HTMLImageElement once loaded

  function hslToHex(h, s, l) {
    s/=100; l/=100;
    const k = n => (n + h/30) % 12;
    const a = s * Math.min(l, 1-l);
    const f = n => l - a * Math.max(-1, Math.min(k(n)-3, Math.min(9-k(n), 1)));
    const toHex = x => Math.round(255*x).toString(16).padStart(2,'0');
    return '#' + toHex(f(0)) + toHex(f(8)) + toHex(f(4));
  }
  function hexToRgb(hex) {
    const v = parseInt(hex.slice(1), 16);
    return [(v>>16)&255, (v>>8)&255, v&255];
  }

  function initGrid(cols, rows) {
    state.points = [];
    const jx = 0.45 / (cols - 1);
    const jy = 0.45 / (rows - 1);
    for (let j = 0; j < rows; j++) {
      for (let i = 0; i < cols; i++) {
        let x = i/(cols-1), y = j/(rows-1);
        const edgeX = (i === 0 || i === cols-1);
        const edgeY = (j === 0 || j === rows-1);
        if (!edgeX) x += (Math.random()*2 - 1) * jx;
        if (!edgeY) y += (Math.random()*2 - 1) * jy;
        state.points.push({
          x: Math.max(0, Math.min(1, x)),
          y: Math.max(0, Math.min(1, y)),
          color: hslToHex(Math.random()*360, 50+Math.random()*40, 35+Math.random()*40),
        });
      }
    }
  }

  // ---------- pipeline ----------
  function renderGradientTo(ctx, w, h) {
    const img = ctx.createImageData(w, h);
    const data = img.data;
    const pts = state.points;
    const n = pts.length;
    const rgbs = pts.map(p => hexToRgb(p.color));
    const pxs = pts.map(p => p.x * w);
    const pys = pts.map(p => p.y * h);
    const power = state.falloff;

    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        let r=0, g=0, b=0, wsum=0, exact=-1;
        for (let k = 0; k < n; k++) {
          const dx = x - pxs[k], dy = y - pys[k];
          const d2 = dx*dx + dy*dy;
          if (d2 < 0.5) { exact = k; break; }
          const ww = 1 / Math.pow(d2, power/2);
          wsum += ww;
          r += rgbs[k][0]*ww;
          g += rgbs[k][1]*ww;
          b += rgbs[k][2]*ww;
        }
        const idx = (y*w + x)*4;
        if (exact >= 0) {
          data[idx]=rgbs[exact][0]; data[idx+1]=rgbs[exact][1]; data[idx+2]=rgbs[exact][2];
        } else {
          data[idx]=r/wsum; data[idx+1]=g/wsum; data[idx+2]=b/wsum;
        }
        data[idx+3] = 255;
      }
    }
    ctx.putImageData(img, 0, 0);
  }

  // Apply displacement using uploaded image. Reads dispImg at target size.
  function applyDisplacement(srcImageData, w, h) {
    if (!state.disp.on || !dispImg) return srcImageData;
    // Render disp source to a scratch canvas at target size
    const sc = document.createElement('canvas');
    sc.width = w; sc.height = h;
    const scx = sc.getContext('2d');
    scx.drawImage(dispImg, 0, 0, w, h);
    const dd = scx.getImageData(0, 0, w, h).data;
    const sd = srcImageData.data;
    const out = new ImageData(w, h);
    const od = out.data;
    const sx_amp = state.disp.strengthX;
    const sy_amp = state.disp.strengthY;
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const di = (y*w + x)*4;
        const lum = (dd[di]*0.299 + dd[di+1]*0.587 + dd[di+2]*0.114) / 255;
        // lum 0..1 → -1..1 offset signal
        const sig = (lum - 0.5) * 2;
        let sx = Math.round(x + sig * sx_amp);
        let sy = Math.round(y + sig * sy_amp);
        if (sx < 0) sx = 0; else if (sx >= w) sx = w-1;
        if (sy < 0) sy = 0; else if (sy >= h) sy = h-1;
        const si = (sy*w + sx)*4;
        od[di]=sd[si]; od[di+1]=sd[si+1]; od[di+2]=sd[si+2]; od[di+3]=255;
      }
    }
    return out;
  }

  function applyDistortion(srcImageData, w, h) {
    if (!state.distortion.on) return srcImageData;
    const { ampX, ampY, freqX, freqY } = state.distortion;
    const sd = srcImageData.data;
    const out = new ImageData(w, h);
    const od = out.data;
    const TAU = Math.PI * 2;
    for (let y = 0; y < h; y++) {
      const dy = ampY * Math.sin(TAU * freqY * (y / h));
      const phaseY = TAU * freqX * (y / h);
      for (let x = 0; x < w; x++) {
        const di = (y*w + x)*4;
        const dx = ampX * Math.sin(phaseY); // distortion of x depends on y → wavy verticals
        const dyTotal = ampY * Math.sin(TAU * freqY * (x / w)); // distortion of y depends on x → wavy horizontals
        let sx = Math.round(x + dx);
        let sy = Math.round(y + dyTotal);
        if (sx < 0) sx = 0; else if (sx >= w) sx = w-1;
        if (sy < 0) sy = 0; else if (sy >= h) sy = h-1;
        const si = (sy*w + sx)*4;
        od[di]=sd[si]; od[di+1]=sd[si+1]; od[di+2]=sd[si+2]; od[di+3]=255;
      }
    }
    return out;
  }

  function applyColorama(imageData) {
    if (!state.colorama.on || state.colorama.stops.length < 2) return imageData;
    const stops = [...state.colorama.stops].sort((a,b) => a.t - b.t)
      .map(s => ({ t: s.t, rgb: hexToRgb(s.color) }));
    const d = imageData.data;
    for (let i = 0; i < d.length; i += 4) {
      const lum = (d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114) / 255;
      let a = stops[0], b = stops[stops.length-1];
      for (let k = 0; k < stops.length-1; k++) {
        if (lum >= stops[k].t && lum <= stops[k+1].t) { a = stops[k]; b = stops[k+1]; break; }
      }
      const span = b.t - a.t || 1;
      const t = Math.max(0, Math.min(1, (lum - a.t) / span));
      d[i]   = a.rgb[0] + (b.rgb[0]-a.rgb[0])*t;
      d[i+1] = a.rgb[1] + (b.rgb[1]-a.rgb[1])*t;
      d[i+2] = a.rgb[2] + (b.rgb[2]-a.rgb[2])*t;
    }
    return imageData;
  }

  // Per-pixel blend mode math (all channels 0..255)
  function blendPixel(mode, base, blend) {
    const b = base / 255, n = blend / 255;
    let r;
    switch (mode) {
      case 'overlay':    r = b < 0.5 ? 2*b*n : 1 - 2*(1-b)*(1-n); break;
      case 'screen':     r = 1 - (1-b)*(1-n); break;
      case 'multiply':   r = b * n; break;
      case 'soft-light': r = b < 0.5
        ? 2*b*n + b*b*(1 - 2*n)
        : 2*b*(1-n) + Math.sqrt(b)*(2*n-1); break;
      default:           r = n;
    }
    return Math.max(0, Math.min(255, r * 255));
  }

  function applyNoise(imageData, w, h) {
    if (!state.noise.on) return imageData;
    const d = imageData.data;
    let s = state.noise.seed;
    const rng = () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; };
    const intensity = state.noise.intensity / 100;
    const mode = state.noise.blend;
    for (let i = 0; i < d.length; i += 4) {
      const grain = (rng() * 256) | 0;
      d[i]   = blendPixel(mode, d[i],   grain) * intensity + d[i]   * (1-intensity);
      d[i+1] = blendPixel(mode, d[i+1], grain) * intensity + d[i+1] * (1-intensity);
      d[i+2] = blendPixel(mode, d[i+2], grain) * intensity + d[i+2] * (1-intensity);
    }
    return imageData;
  }

  // Full pipeline: gradient → displacement → distortion → blur → noise → colorama
  function renderPipeline(targetCtx, w, h) {
    const work = document.createElement('canvas');
    work.width = w; work.height = h;
    const wctx = work.getContext('2d');

    renderGradientTo(wctx, w, h);
    let data = wctx.getImageData(0, 0, w, h);
    data = applyDisplacement(data, w, h);
    data = applyDistortion(data, w, h);
    wctx.putImageData(data, 0, 0);

    targetCtx.clearRect(0, 0, w, h);
    if (state.blur.on && state.blur.radius > 0) {
      targetCtx.filter = `blur(${state.blur.radius}px)`;
      targetCtx.drawImage(work, 0, 0);
      targetCtx.filter = 'none';
    } else {
      targetCtx.drawImage(work, 0, 0);
    }

    let final = targetCtx.getImageData(0, 0, w, h);
    final = applyNoise(final, w, h);
    final = applyColorama(final);
    targetCtx.putImageData(final, 0, 0);
  }

  // ---------- preview render ----------
  let renderScheduled = false;
  function scheduleRender() {
    if (renderScheduled) return;
    renderScheduled = true;
    requestAnimationFrame(() => {
      renderScheduled = false;
      renderPipeline(outCtx, W, H);
      drawInteraction();
    });
  }

  function drawInteraction() {
    intCtx.clearRect(0, 0, W, H);
    for (const p of state.points) {
      const x = p.x * W, y = p.y * H;
      intCtx.beginPath();
      intCtx.arc(x, y, 7, 0, Math.PI*2);
      intCtx.fillStyle = p.color;
      intCtx.fill();
      intCtx.lineWidth = 2;
      intCtx.strokeStyle = '#000';
      intCtx.stroke();
      intCtx.lineWidth = 1;
      intCtx.strokeStyle = '#fff';
      intCtx.stroke();
    }
  }

  // ---------- interaction ----------
  let dragIdx = -1, didDrag = false;
  function hitTest(x, y) {
    for (let i = state.points.length-1; i >= 0; i--) {
      const px = state.points[i].x * W, py = state.points[i].y * H;
      const dx = x - px, dy = y - py;
      if (dx*dx + dy*dy <= 11*11) return i;
    }
    return -1;
  }
  function canvasCoords(e) {
    const r = interaction.getBoundingClientRect();
    return { x: (e.clientX - r.left) * (W/r.width), y: (e.clientY - r.top) * (H/r.height) };
  }
  interaction.addEventListener('mousedown', e => {
    if (e.button === 2) return;
    const { x, y } = canvasCoords(e);
    dragIdx = hitTest(x, y);
    didDrag = false;
  });
  window.addEventListener('mousemove', e => {
    if (dragIdx < 0) return;
    const { x, y } = canvasCoords(e);
    state.points[dragIdx].x = Math.max(0, Math.min(1, x / W));
    state.points[dragIdx].y = Math.max(0, Math.min(1, y / H));
    didDrag = true;
    scheduleRender();
  });
  window.addEventListener('mouseup', () => {
    if (dragIdx >= 0 && !didDrag) {
      const idx = dragIdx;
      const picker = document.getElementById('hiddenColor');
      picker.value = state.points[idx].color;
      picker.oninput = () => { state.points[idx].color = picker.value; scheduleRender(); };
      picker.click();
    }
    dragIdx = -1;
  });
  interaction.addEventListener('contextmenu', e => {
    e.preventDefault();
    const { x, y } = canvasCoords(e);
    const idx = hitTest(x, y);
    if (idx >= 0 && state.points.length > 2) {
      state.points.splice(idx, 1);
      scheduleRender();
    }
  });

  // ---------- ramp UI ----------
  const rampEl = document.getElementById('ramp');
  function renderRamp() {
    rampEl.innerHTML = '';
    state.colorama.stops.forEach((stop, i) => {
      const row = document.createElement('div');
      row.className = 'ramp-stop';
      const color = document.createElement('input');
      color.type = 'color'; color.value = stop.color;
      color.oninput = () => { stop.color = color.value; scheduleRender(); };
      const range = document.createElement('input');
      range.type = 'range'; range.min = 0; range.max = 100; range.value = Math.round(stop.t*100);
      range.style.flex = '1';
      const val = document.createElement('span');
      val.className = 'val'; val.textContent = Math.round(stop.t*100);
      range.oninput = () => { stop.t = range.value/100; val.textContent = range.value; scheduleRender(); };
      const del = document.createElement('button');
      del.className = 'icon'; del.textContent = '×';
      del.onclick = () => {
        if (state.colorama.stops.length > 2) {
          state.colorama.stops.splice(i, 1);
          renderRamp(); scheduleRender();
        }
      };
      row.append(color, range, val, del);
      rampEl.appendChild(row);
    });
  }

  // ---------- collapsibles ----------
  document.querySelectorAll('[data-section]').forEach(sec => {
    sec.querySelector('.section-head').addEventListener('click', () => sec.classList.toggle('open'));
  });

  // ---------- bindings ----------
  function bindRange(id, valId, target, key, parse = parseFloat) {
    const el = document.getElementById(id);
    const v = document.getElementById(valId);
    el.addEventListener('input', () => {
      target[key] = parse(el.value);
      if (v) v.textContent = el.value;
      scheduleRender();
    });
  }
  function bindCheck(id, target, key) {
    document.getElementById(id).addEventListener('change', e => {
      target[key] = e.target.checked; scheduleRender();
    });
  }

  document.getElementById('applyGrid').onclick = () => {
    const cols = Math.max(2, Math.min(10, parseInt(document.getElementById('gridCols').value) || 4));
    const rows = Math.max(2, Math.min(10, parseInt(document.getElementById('gridRows').value) || 4));
    initGrid(cols, rows); scheduleRender();
  };
  document.getElementById('randomizeColors').onclick = () => {
    state.points.forEach(p => { p.color = hslToHex(Math.random()*360, 50+Math.random()*40, 35+Math.random()*40); });
    scheduleRender();
  };
  document.getElementById('addPoint').onclick = () => {
    state.points.push({ x: 0.5, y: 0.5, color: hslToHex(Math.random()*360, 70, 55) });
    scheduleRender();
  };
  bindRange('falloff', 'falloffVal', state, 'falloff');

  bindCheck('blurOn', state.blur, 'on');
  bindRange('blurRadius', 'blurRadiusVal', state.blur, 'radius', parseInt);

  bindCheck('distOn', state.distortion, 'on');
  bindRange('distAmpX', 'distAmpXVal', state.distortion, 'ampX', parseInt);
  bindRange('distAmpY', 'distAmpYVal', state.distortion, 'ampY', parseInt);
  bindRange('distFreqX', 'distFreqXVal', state.distortion, 'freqX');
  bindRange('distFreqY', 'distFreqYVal', state.distortion, 'freqY');

  bindCheck('dispOn', state.disp, 'on');
  bindRange('dispStrengthX', 'dispStrengthXVal', state.disp, 'strengthX', parseInt);
  bindRange('dispStrengthY', 'dispStrengthYVal', state.disp, 'strengthY', parseInt);
  document.getElementById('dispFile').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      dispImg = img;
      document.getElementById('dispThumb').src = url;
      scheduleRender();
    };
    img.src = url;
  });

  bindCheck('coloramaOn', state.colorama, 'on');
  document.getElementById('addStop').onclick = () => {
    state.colorama.stops.push({ t: 0.5, color: '#888888' });
    renderRamp(); scheduleRender();
  };

  bindCheck('noiseOn', state.noise, 'on');
  bindRange('noiseIntensity', 'noiseIntensityVal', state.noise, 'intensity', parseInt);
  document.getElementById('noiseBlend').addEventListener('change', e => {
    state.noise.blend = e.target.value; scheduleRender();
  });
  document.getElementById('reseedNoise').onclick = () => {
    state.noise.seed = Math.floor(Math.random()*1e9); scheduleRender();
  };

  // export
  const exportW = document.getElementById('exportW');
  const exportH = document.getElementById('exportH');
  document.getElementById('exportPreset').addEventListener('change', e => {
    if (!e.target.value) return;
    const [w, h] = e.target.value.split('x').map(Number);
    exportW.value = w; exportH.value = h;
  });
  document.getElementById('exportBtn').onclick = () => {
    const w = Math.max(64, Math.min(8192, parseInt(exportW.value) || 1920));
    const h = Math.max(64, Math.min(8192, parseInt(exportH.value) || 1080));
    const out = document.createElement('canvas');
    out.width = w; out.height = h;
    renderPipeline(out.getContext('2d'), w, h);
    const link = document.createElement('a');
    link.download = `mesh-gradient-${w}x${h}.png`;
    link.href = out.toDataURL('image/png');
    link.click();
  };

  // ---------- pixel-dither fill ----------
  function pixelFill(btn, { color = '#dbf530', pixelSize = 8, stepMs = 10 } = {}) {
    // Wrap text
    const textSpan = document.createElement('span');
    textSpan.className = '__pf-text';
    textSpan.textContent = btn.textContent;
    btn.textContent = '';
    btn.appendChild(textSpan);

    const overlay = document.createElement('span');
    overlay.className = '__pf-overlay';
    btn.appendChild(overlay);

    let cells = [], timers = [], built = false;

    function build() {
      overlay.innerHTML = '';
      cells = [];
      const { width, height } = btn.getBoundingClientRect();
      const cols = Math.ceil(width / pixelSize);
      const rows = Math.ceil(height / pixelSize);
      overlay.style.cssText = 'position:absolute;inset:0;pointer-events:none;';
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cell = document.createElement('span');
          cell.style.cssText = `position:absolute;width:${pixelSize}px;height:${pixelSize}px;left:${c*pixelSize}px;top:${r*pixelSize}px;background:${color};opacity:0;`;
          overlay.appendChild(cell);
          cells.push(cell);
        }
      }
      built = true;
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = (Math.random() * (i + 1)) | 0;
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function clearTimers() { timers.forEach(clearTimeout); timers = []; }

    btn.addEventListener('mouseenter', () => {
      if (!built) build();
      clearTimers();
      const order = shuffle([...Array(cells.length).keys()]);
      order.forEach((idx, i) => {
        timers.push(setTimeout(() => { cells[idx].style.opacity = '1'; }, i * stepMs));
      });
    });

    btn.addEventListener('mouseleave', () => {
      clearTimers();
      const order = shuffle([...Array(cells.length).keys()]);
      order.forEach((idx, i) => {
        timers.push(setTimeout(() => { cells[idx].style.opacity = '0'; }, i * stepMs));
      });
    });

    const ro = new ResizeObserver(() => { built = false; build(); });
    ro.observe(btn);
  }

  // ---------- init ----------
  initGrid(4, 4);
  renderRamp();

  (function loadDefaultDisp() {
    const img = new Image();
    img.onload = () => {
      dispImg = img;
      const thumb = document.getElementById('dispThumb');
      if (thumb) thumb.src = img.src;
      scheduleRender();
    };
    img.onerror = () => scheduleRender();
    img.src = window.__DEFAULT_DISP_DATA_URL || 'displacement-default.png';
  })();

  scheduleRender();

  pixelFill(document.getElementById('exportBtn'));
})();
</script>
</body>
</html>
